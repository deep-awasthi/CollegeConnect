version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: collegeconnect-db
    environment:
      POSTGRES_DB: collegeconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collegeconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: collegeconnect-cache
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: collegeconnect-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - REDIS_HOST=cache
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

volumes:
  postgres_data:
